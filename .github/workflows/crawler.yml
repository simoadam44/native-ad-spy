name: Native Ad Spy Scheduler

on:
  schedule:
    # سيتم التشغيل كل 6 ساعات لتجنب التكلفة العالية على البروكسي
    - cron: '0 */6 * * *'
  # يتيح لك تشغيل الأداة يدوياً من تبويب Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run Master Spy
        env:
          # تأكد من إضافة هذه المفاتيح في إعدادات Settings -> Secrets في GitHub
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python master_spy.py
