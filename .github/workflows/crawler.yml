name: Run Crawler

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Python packages
        run: pip install -r requirements.txt
      
      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Run crawler
        run: python crawler.py
